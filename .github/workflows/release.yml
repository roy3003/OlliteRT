name: Build and release signed APK from version tag (stable/beta/dev)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0, v1.0.0-beta.1, v1.0.0-dev.2)'
        required: true
      build_only:
        description: 'Build APK only — no tag, no release (for test builds)'
        type: boolean
        default: false
      create_tag:
        description: 'Create the tag if it does not exist yet (ignored when build_only)'
        type: boolean
        default: false
      publish:
        description: 'Create a GitHub Release (ignored when build_only)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  # Normalize: dispatch uses 'v1.0.0', push uses 'refs/tags/v1.0.0'
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JDK_VERSION: '21'
  PYTHON_VERSION: '3.12'
  ARTIFACT_RETENTION_DAYS: '90'

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ github.run_number }}
      tag: ${{ steps.tag.outputs.tag }}
    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Validate tag format
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ ! "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+|-dev\.[0-9]+)?$ ]]; then
            echo "::error::Invalid tag format: $INPUT_TAG (expected vX.Y.Z, vX.Y.Z-beta.N, or vX.Y.Z-dev.N)"
            exit 1
          fi
        working-directory: .

      - name: Validate signing secrets
        if: ${{ github.event.inputs.build_only != 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          MISSING=()
          [ -z "$KEYSTORE_BASE64" ] && MISSING+=("KEYSTORE_BASE64")
          [ -z "$STORE_PASSWORD" ] && MISSING+=("STORE_PASSWORD")
          [ -z "$KEY_ALIAS" ] && MISSING+=("KEY_ALIAS")
          [ -z "$KEY_PASSWORD" ] && MISSING+=("KEY_PASSWORD")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing signing secrets: ${MISSING[*]} — configure in repository Settings > Secrets"
            exit 1
          fi
        working-directory: .

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Always checkout default branch for workflow_dispatch (tag may
          # not exist yet, or we need to verify it first). Push-triggered
          # runs checkout the tag directly via GITHUB_REF.
          ref: ${{ github.event_name == 'push' && github.ref || '' }}
          # Full history + tags needed for git rev-list --count (auto
          # versionCode) and tag verification/creation
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag ref
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_only != 'true' }}
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          CREATE_TAG: ${{ github.event.inputs.create_tag }}
        run: |
          if git rev-parse "$INPUT_TAG" >/dev/null 2>&1; then
            if [ "$CREATE_TAG" = "true" ]; then
              echo "::warning::Tag $INPUT_TAG already exists — building from existing tag"
            fi
            git checkout "$INPUT_TAG"
          elif [ "$CREATE_TAG" = "true" ]; then
            git tag "$INPUT_TAG"
            git push origin "$INPUT_TAG"
            echo "Created and pushed tag $INPUT_TAG"
          else
            echo "::error::Tag $INPUT_TAG does not exist. Check 'Create the tag' to create it, or push the tag first."
            exit 1
          fi
        working-directory: .

      - name: Determine tag and channel
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          BUILD_ONLY: ${{ github.event.inputs.build_only }}
        run: |
          # Use the pushed tag, or the manual input
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Extract version name: v1.2.3-beta.1 → 1.2.3-beta.1
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Determine channel and Gradle task from tag pattern
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "task=assembleStableRelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "flavor=stable" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "task=assembleBetaRelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "flavor=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "flavor=dev" >> "$GITHUB_OUTPUT"
            if [ "$BUILD_ONLY" = "true" ]; then
              echo "task=assembleDevDebug" >> "$GITHUB_OUTPUT"
            else
              echo "task=assembleDevRelease" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::error::Unrecognized tag format: $TAG (expected vX.Y.Z, vX.Y.Z-beta.N, or vX.Y.Z-dev.N)"
            exit 1
          fi

      - name: Validate tag version matches gradle.properties
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_only != 'true' }}
        env:
          TAG_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # Extract base version from tag: 0.9.0-beta.1 → 0.9.0, 0.9.0 → 0.9.0
          TAG_BASE="${TAG_VERSION%%-*}"
          GRADLE_VERSION=$(grep -oP '(?<=^APP_VERSION_NAME=).+' gradle.properties)
          if [ "$TAG_BASE" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag base version ($TAG_BASE) does not match gradle.properties APP_VERSION_NAME ($GRADLE_VERSION). Did you forget to bump the version?"
            exit 1
          fi
          echo "Version check passed: tag=$TAG_BASE, gradle.properties=$GRADLE_VERSION"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}
          cache: gradle

      - name: Read SDK versions from build config
        id: sdk
        run: |
          COMPILE_SDK=$(grep -oP '(?<=compileSdk\s=\s)\d+' app/build.gradle.kts)
          BUILD_TOOLS=$(grep -oP '(?<=buildToolsVersion\s=\s")[^"]+' app/build.gradle.kts || echo "${COMPILE_SDK}.0.0")
          echo "compile_sdk=$COMPILE_SDK" >> "$GITHUB_OUTPUT"
          echo "build_tools=$BUILD_TOOLS" >> "$GITHUB_OUTPUT"
          echo "SDK: platforms;android-${COMPILE_SDK} build-tools;${BUILD_TOOLS}"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        env:
          COMPILE_SDK: ${{ steps.sdk.outputs.compile_sdk }}
          BUILD_TOOLS: ${{ steps.sdk.outputs.build_tools }}
        run: |
          sdkmanager --licenses < /dev/null > /dev/null || true
          sdkmanager "platforms;android-${COMPILE_SDK}" "build-tools;${BUILD_TOOLS}" "platform-tools"

      - name: Decode release keystore
        if: ${{ github.event.inputs.build_only != 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
        working-directory: .

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_TASK: ${{ steps.tag.outputs.task }}
          APP_VERSION: ${{ steps.tag.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
        run: |
          ./gradlew --no-daemon "$GRADLE_TASK" \
            -PAPP_VERSION_NAME="$APP_VERSION" \
            -PAPP_VERSION_CODE="$VERSION_CODE"

      - name: Rename APKs
        id: apks
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          FLAVOR: ${{ steps.tag.outputs.flavor }}
          BUILD_ONLY: ${{ github.event.inputs.build_only }}
        run: |
          OUT_DIR="app/build/outputs/apk/${FLAVOR}/release"
          if [ "$BUILD_ONLY" = "true" ]; then
            OUT_DIR="app/build/outputs/apk/${FLAVOR}/debug"
          fi
          RELEASE_DIR="release-apks"
          mkdir -p "$RELEASE_DIR"

          shopt -s nullglob
          for APK in "$OUT_DIR"/*.apk; do
            BASENAME=$(basename "$APK")
            DEST="$RELEASE_DIR/OlliteRT-${TAG}-arm64-v8a.apk"
            cp "$APK" "$DEST"
            SIZE=$(stat -c%s "$DEST")
            echo "$(basename "$DEST"): $(numfmt --to=iec-i --suffix=B $SIZE)"
          done

          if [ -z "$(ls -A "$RELEASE_DIR" 2>/dev/null)" ]; then
            echo "::error::No APK files found in $OUT_DIR — build or signing may have failed"
            exit 1
          fi

          echo "dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksums
        id: checksums
        env:
          RELEASE_DIR: ${{ steps.apks.outputs.dir }}
        run: |
          cd "$RELEASE_DIR"
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload APK artifacts
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: OlliteRT-${{ steps.tag.outputs.tag }}-arm64-v8a
          path: Android/src/${{ steps.apks.outputs.dir }}/*.apk
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Job summary
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          CHANNEL: ${{ steps.tag.outputs.channel }}
          VERSION_CODE: ${{ github.run_number }}
          RELEASE_DIR: ${{ steps.apks.outputs.dir }}
          BUILD_ONLY: ${{ github.event.inputs.build_only }}
          GRADLE_TASK: ${{ steps.tag.outputs.task }}
          REPO: ${{ github.repository }}
          PUBLISH: ${{ github.event.inputs.publish }}
          EVENT_NAME: ${{ github.event_name }}
          COMPILE_SDK: ${{ steps.sdk.outputs.compile_sdk }}
          BUILD_TOOLS: ${{ steps.sdk.outputs.build_tools }}
          RETENTION_DAYS: ${{ env.ARTIFACT_RETENTION_DAYS }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_FULL=$(git rev-parse HEAD)
          APK_FILE=$(ls "$RELEASE_DIR"/*.apk | head -1)
          APK_NAME=$(basename "$APK_FILE")
          APK_SIZE=$(numfmt --to=iec-i --suffix=B "$(stat -c%s "$APK_FILE")")
          BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "detached")
          JDK_VERSION=$(java -version 2>&1 | head -1)
          SDK_VERSION=$(cat "$ANDROID_HOME/cmdline-tools/latest/source.properties" 2>/dev/null | grep -oP '(?<=Pkg.Revision=).+' || echo "unknown")
          GRADLE_VERSION=$(./gradlew --version 2>/dev/null | grep -oP '(?<=Gradle )\S+' || echo "unknown")
          EXPIRY_DATE=$(date -d "+${RETENTION_DAYS} days" "+%B %d, %Y")

          SUFFIX=""
          if [ "$BUILD_ONLY" = "true" ]; then SUFFIX=" (build only)"; fi

          WILL_PUBLISH="false"
          if [ "$EVENT_NAME" = "push" ] || [ "$PUBLISH" = "true" ]; then
            if [ "$BUILD_ONLY" != "true" ]; then
              WILL_PUBLISH="true"
            fi
          fi

          {
            echo "## Release Build: ${TAG}${SUFFIX}"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Branch** | \`${BRANCH}\` |"
            echo "| **Channel** | ${CHANNEL} |"
            echo "| **Version code** | ${VERSION_CODE} |"
            echo "| **Commit** | [\`${COMMIT_SHA}\`](https://github.com/${REPO}/commit/${COMMIT_FULL}) |"
            echo "| **APK** | \`${APK_NAME}\` |"
            echo "| **Size** | ${APK_SIZE} |"
            echo "| **Download** | [OlliteRT-${TAG}-arm64-v8a.zip](${ARTIFACT_URL}) |"
            if [ "$WILL_PUBLISH" != "true" ]; then
              echo "| **Artifact expires** | ${EXPIRY_DATE} |"
            fi
            echo ""
            if [ "$WILL_PUBLISH" = "true" ]; then
              echo "**Release:** [GitHub Release](https://github.com/${REPO}/releases/tag/${TAG})"
              echo ""
            fi
            echo "<details><summary>Build environment</summary>"
            echo ""
            echo "- Gradle task: \`${GRADLE_TASK}\`"
            echo "- Gradle: \`${GRADLE_VERSION}\`"
            echo "- JDK: \`${JDK_VERSION}\`"
            echo "- Android SDK: \`${SDK_VERSION}\`"
            echo "- compileSdk: \`${COMPILE_SDK}\`"
            echo "- buildTools: \`${BUILD_TOOLS}\`"
            echo "</details>"
            echo ""
            CHECKSUM=$(awk '{print $1}' "$RELEASE_DIR/SHA256SUMS.txt" | head -1)
            echo "<details><summary>SHA256 checksum</summary>"
            echo ""
            echo "\`\`\`"
            echo "$CHECKSUM"
            echo "\`\`\`"
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        if: ${{ github.event.inputs.build_only != 'true' && (github.event_name == 'push' || github.event.inputs.publish == 'true') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: OlliteRT ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            Android/src/${{ steps.apks.outputs.dir }}/*.apk
            Android/src/${{ steps.apks.outputs.dir }}/SHA256SUMS.txt
          token: ${{ secrets.GITHUB_TOKEN }}

  fastlane-changelog:
    needs: release
    runs-on: ubuntu-latest
    # Only run for stable releases (not beta/dev — no store listing for those).
    # Uses needs.release.outputs.tag (not github.ref) because workflow_dispatch
    # sets github.ref to the branch name, not the tag entered by the user.
    if: ${{ github.event.inputs.build_only != 'true' && (github.event_name == 'push' || github.event.inputs.publish == 'true') && !contains(needs.release.outputs.tag, '-beta.') && !contains(needs.release.outputs.tag, '-dev.') }}
    permissions:
      contents: write
    concurrency:
      group: fastlane-changelog
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TAG" ]; then
            echo "::error::Tag output is empty — release job may not have set outputs.tag"
            exit 1
          fi
          # Fetch release body via GitHub API — handles all special chars safely.
          # .body // empty: outputs nothing for null body (instead of literal "null").
          gh api "repos/$REPO/releases/tags/$TAG" \
            --jq '.body // empty' > "$RUNNER_TEMP/release_body.txt"
          BYTES=$(wc -c < "$RUNNER_TEMP/release_body.txt")
          echo "Retrieved release body ($BYTES bytes)"
          if [ "$BYTES" -lt 2 ]; then
            echo "::warning::Release body is empty — changelog will be skipped"
          fi

      - name: Generate fastlane changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/generate_fastlane_changelog.py \
            < "$RUNNER_TEMP/release_body.txt" \
            > "$RUNNER_TEMP/changelog.txt"

          if [ ! -s "$RUNNER_TEMP/changelog.txt" ]; then
            echo "::warning::No changelog generated (empty output) — skipping commit"
            echo "SKIP_COMMIT=true" >> "$GITHUB_ENV"
          else
            echo "--- Generated changelog ---"
            cat "$RUNNER_TEMP/changelog.txt"
            echo ""
            echo "--- Length: $(python3 -c "import sys; print(len(sys.stdin.read().strip()), 'chars')" < "$RUNNER_TEMP/changelog.txt") ---"
          fi

      - name: Commit changelog
        if: ${{ env.SKIP_COMMIT != 'true' }}
        env:
          VERSION_CODE: ${{ needs.release.outputs.version_code }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          CHANGELOG_DIR="Android/src/fastlane/metadata/android/en-US/changelogs"
          CHANGELOG_FILE="$CHANGELOG_DIR/${VERSION_CODE}.txt"

          mkdir -p "$CHANGELOG_DIR"
          cp "$RUNNER_TEMP/changelog.txt" "$CHANGELOG_FILE"

          git add "$CHANGELOG_FILE"

          # Only commit if there's actually a change
          if git diff --cached --quiet; then
            echo "No changes to commit (file already exists with same content)"
          else
            git commit -m "Add fastlane changelog for $TAG (versionCode $VERSION_CODE)"
            git pull --rebase origin main
            git push origin main
          fi

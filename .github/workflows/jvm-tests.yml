name: Validate build — compile, test, lint

on:
  push:
    paths:
      - 'Android/src/**'
      - '.github/workflows/jvm-tests.yml'
  pull_request:
    paths:
      - 'Android/src/**'
      - '.github/workflows/jvm-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Needed for git rev-list --count (auto versionCode)
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager --licenses < /dev/null > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Compile stableDebug
        run: ./gradlew --no-daemon :app:compileStableDebugKotlin

      - name: Run JVM unit tests
        run: ./gradlew --no-daemon :app:testStableDebugUnitTest

      - name: Run lint
        run: ./gradlew --no-daemon :app:lintStableDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ github.sha }}
          path: |
            Android/src/app/build/reports/tests/testStableDebugUnitTest/
            Android/src/app/build/test-results/testStableDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report-${{ github.sha }}
          path: Android/src/app/build/reports/lint-results-stableDebug.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Job summary
        if: always()
        env:
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          RESULTS_DIR="app/build/test-results/testStableDebugUnitTest"
          LINT_REPORT="app/build/reports/lint-results-stableDebug.xml"
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_FULL=$(git rev-parse HEAD)
          APP_VERSION=$(grep -oP '(?<=^APP_VERSION_NAME=).+' gradle.properties)
          BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "detached")

          TOTAL=0; FAILED=0; SKIPPED=0; ERRORS=0; TIME="0"
          if [ -d "$RESULTS_DIR" ]; then
            for XML in "$RESULTS_DIR"/*.xml; do
              [ -f "$XML" ] || continue
              T=$(grep -oP '(?<=tests=")[^"]+' "$XML" | head -1)
              F=$(grep -oP '(?<=failures=")[^"]+' "$XML" | head -1)
              E=$(grep -oP '(?<=errors=")[^"]+' "$XML" | head -1)
              S=$(grep -oP '(?<=skipped=")[^"]+' "$XML" | head -1)
              TM=$(grep -oP '(?<=time=")[^"]+' "$XML" | head -1)
              TOTAL=$((TOTAL + ${T:-0}))
              FAILED=$((FAILED + ${F:-0}))
              ERRORS=$((ERRORS + ${E:-0}))
              SKIPPED=$((SKIPPED + ${S:-0}))
              TIME=$(python3 -c "print(round(${TIME:-0} + ${TM:-0}, 2))")
            done
          fi
          PASSED=$((TOTAL - FAILED - ERRORS - SKIPPED))

          if [ "$FAILED" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
            STATUS="❌ FAILED"
          elif [ "$TOTAL" -eq 0 ]; then
            STATUS="⚠️ NO TESTS RUN"
          else
            STATUS="✅ PASSED"
          fi

          TRIGGER="push"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            TRIGGER="pull request"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TRIGGER="manual"
          fi

          # Lint counts
          LINT_ERRORS=0; LINT_WARNINGS=0
          if [ -f "$LINT_REPORT" ]; then
            LINT_ERRORS=$(grep -c 'severity="Error"' "$LINT_REPORT" || true)
            LINT_WARNINGS=$(grep -c 'severity="Warning"' "$LINT_REPORT" || true)
          fi

          {
            echo "## JVM Unit Tests: $STATUS"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Commit** | [\`$COMMIT_SHA\`](https://github.com/$REPO/commit/$COMMIT_FULL) |"
            echo "| **Branch** | \`$BRANCH\` |"
            echo "| **App version** | $APP_VERSION |"
            echo "| **Trigger** | $TRIGGER |"
            echo "| **Total tests** | $TOTAL |"
            echo "| **Passed** | $PASSED |"
            if [ "$FAILED" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              echo "| **Failed** | $((FAILED + ERRORS)) |"
            fi
            if [ "$SKIPPED" -gt 0 ]; then
              echo "| **Skipped** | $SKIPPED |"
            fi
            echo "| **Duration** | ${TIME}s |"
            if [ -f "$LINT_REPORT" ]; then
              echo "| **Lint errors** | $LINT_ERRORS |"
              echo "| **Lint warnings** | $LINT_WARNINGS |"
            fi
            echo ""

            # Show failed tests with assertion messages (not collapsed)
            if [ "$FAILED" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              echo "### Failed Tests"
              echo ""
              for XML in "$RESULTS_DIR"/*.xml; do
                [ -f "$XML" ] || continue
                python3 -c "
          import xml.etree.ElementTree as ET, re
          tree = ET.parse('$XML')
          for tc in tree.iter('testcase'):
              failure = tc.find('failure')
              error = tc.find('error')
              elem = failure if failure is not None else error
              if elem is None:
                  continue
              cls = tc.get('classname', '')
              name = tc.get('name', '')
              msg = elem.get('message', '')
              if len(msg) > 200:
                  msg = msg[:200] + '…'
              print(f'- \`{cls}.{name}\`')
              if msg:
                  print(f'  > {msg}')
              # Extract first project source line from stack trace
              trace = elem.text or ''
              match = re.search(r'at .+\((\w+\.kt:\d+)\)', trace)
              if match:
                  print(f'  > at {match.group(1)}')
          "
              done
              echo ""
            fi

            # Show skipped tests
            if [ "$SKIPPED" -gt 0 ]; then
              echo "### Skipped Tests"
              echo ""
              for XML in "$RESULTS_DIR"/*.xml; do
                [ -f "$XML" ] || continue
                python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$XML')
          for tc in tree.iter('testcase'):
              if tc.find('skipped') is not None:
                  cls = tc.get('classname', '').rsplit('.', 1)[-1]
                  name = tc.get('name', '')
                  print(f'- \`{cls}.{name}\`')
          "
              done
              echo ""
            fi

            # Lint details (collapsed)
            if [ -f "$LINT_REPORT" ] && [ "$LINT_ERRORS" -gt 0 ]; then
              echo "<details><summary>Lint errors ($LINT_ERRORS)</summary>"
              echo ""
              python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$LINT_REPORT')
          for issue in tree.iter('issue'):
              if issue.get('severity') != 'Error':
                  continue
              msg = issue.get('message', '')
              loc = issue.find('location')
              if loc is not None:
                  f = loc.get('file', '').replace('$PWD/', '')
                  line = loc.get('line', '')
                  print(f'- \`{f}:{line}\` — {msg}')
              else:
                  print(f'- {msg}')
          "
              echo ""
              echo "</details>"
            fi

            # Lint overview by category (collapsed)
            if [ -f "$LINT_REPORT" ] && [ "$LINT_WARNINGS" -gt 0 ]; then
              echo "<details><summary>Lint overview ($LINT_WARNINGS warnings)</summary>"
              echo ""
              python3 -c "
          import xml.etree.ElementTree as ET
          from collections import defaultdict, OrderedDict

          tree = ET.parse('$LINT_REPORT')

          # Group: category -> issue_id -> {summary, count, details[]}
          groups = defaultdict(lambda: defaultdict(lambda: {'summary': '', 'count': 0, 'details': []}))

          for issue in tree.iter('issue'):
              if issue.get('severity') not in ('Warning', 'Information'):
                  continue
              cat = issue.get('category', 'Other')
              issue_id = issue.get('id', 'Unknown')
              entry = groups[cat][issue_id]
              entry['count'] += 1
              if not entry['summary']:
                  entry['summary'] = issue.get('summary', '')
              msg = issue.get('message', '')
              if issue_id in ('NewerVersionAvailable', 'GradleDependency', 'AndroidGradlePluginVersion') and msg:
                  if msg not in entry['details']:
                      entry['details'].append(msg)

          for cat in sorted(groups.keys()):
              issues = groups[cat]
              print(f'**{cat}**')
              print('')
              print('| # | Issue | Description |')
              print('|---|-------|-------------|')
              for issue_id, info in sorted(issues.items(), key=lambda x: -x[1]['count']):
                  count = info['count']
                  summary = info['summary']
                  details = info['details']
                  desc = summary
                  if details:
                      shown = [d[:90] for d in details[:4]]
                      desc += '<br>' + '<br>'.join(shown)
                      if len(details) > 4:
                          desc += f'<br>… +{len(details) - 4} more'
                  print(f'| {count} | {issue_id} | {desc} |')
              print('')
          "
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

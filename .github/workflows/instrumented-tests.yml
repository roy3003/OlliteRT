name: Instrumented tests — Android emulator

on:
  push:
    branches: [main]
    paths:
      - 'Android/src/gradle.properties'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: instrumented-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        working-directory: .

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager --licenses < /dev/null > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" "system-images;android-31;default;x86_64" "emulator"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: Android/src
          script: ./gradlew --no-daemon :app:connectedStableDebugAndroidTest -PDISABLE_ABI_SPLITS=true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-reports-${{ github.sha }}
          path: Android/src/app/build/reports/androidTests/connected/
          if-no-files-found: ignore
          retention-days: 14

      - name: Job summary
        if: always()
        env:
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          RESULTS_DIR="app/build/outputs/androidTest-results/connected/debug/flavors/stable"
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_FULL=$(git rev-parse HEAD)
          APP_VERSION=$(grep -oP '(?<=^APP_VERSION_NAME=).+' gradle.properties)
          BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "detached")

          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; ERRORS=0; TIME="0"
          if [ -d "$RESULTS_DIR" ]; then
            for XML in "$RESULTS_DIR"/*.xml; do
              [ -f "$XML" ] || continue
              T=$(grep -oP '(?<=tests=")[^"]+' "$XML" | head -1)
              F=$(grep -oP '(?<=failures=")[^"]+' "$XML" | head -1)
              E=$(grep -oP '(?<=errors=")[^"]+' "$XML" | head -1)
              S=$(grep -oP '(?<=skipped=")[^"]+' "$XML" | head -1)
              TM=$(grep -oP '(?<=time=")[^"]+' "$XML" | head -1)
              TOTAL=$((TOTAL + ${T:-0}))
              FAILED=$((FAILED + ${F:-0}))
              ERRORS=$((ERRORS + ${E:-0}))
              SKIPPED=$((SKIPPED + ${S:-0}))
              TIME=$(python3 -c "print(round(${TIME:-0} + ${TM:-0}, 2))")
            done
            PASSED=$((TOTAL - FAILED - ERRORS - SKIPPED))
          fi

          if [ "$FAILED" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
            STATUS="❌ FAILED"
          elif [ "$TOTAL" -eq 0 ]; then
            STATUS="⚠️ NO TESTS RUN"
          else
            STATUS="✅ PASSED"
          fi

          TRIGGER="push"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TRIGGER="manual"
          fi

          {
            echo "## Instrumented Tests: $STATUS"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Commit** | [\`$COMMIT_SHA\`](https://github.com/$REPO/commit/$COMMIT_FULL) |"
            echo "| **Branch** | \`$BRANCH\` |"
            echo "| **App version** | $APP_VERSION |"
            echo "| **Trigger** | $TRIGGER |"
            echo "| **Build type** | stableDebug |"
            echo "| **Emulator** | API 31, x86_64 |"
            echo "| **Total tests** | $TOTAL |"
            echo "| **Passed** | $PASSED |"
            if [ "$FAILED" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              echo "| **Failed** | $((FAILED + ERRORS)) |"
            fi
            if [ "$SKIPPED" -gt 0 ]; then
              echo "| **Skipped** | $SKIPPED |"
            fi
            echo "| **Duration** | ${TIME}s |"
            echo ""
            if [ -d "$RESULTS_DIR" ] && [ "$TOTAL" -gt 0 ]; then
              echo "<details><summary>Test classes</summary>"
              echo ""
              # Android produces one XML per device — extract per-class results from testcase elements
              for XML in "$RESULTS_DIR"/*.xml; do
                [ -f "$XML" ] || continue
                grep -oP '(?<=classname=")[^"]+' "$XML" | sort -u | while read -r CLASS; do
                  CT=$(grep -c "classname=\"$CLASS\"" "$XML")
                  # Count failures: testcases with a <failure> child element
                  CF=$(grep -B1 '<failure' "$XML" | grep -c "classname=\"$CLASS\"" || true)
                  SHORT_CLASS="${CLASS##*.}"
                  if [ "$CF" -gt 0 ]; then
                    echo "- ❌ \`$SHORT_CLASS\` — ${CT} tests, ${CF} failed"
                  else
                    echo "- ✅ \`$SHORT_CLASS\` — ${CT} tests"
                  fi
                done
              done
              echo ""
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

syntax = "proto3";

package com.ollitert.llm.server.proto;

option java_package = "com.ollitert.llm.server.proto";
option java_multiple_files = true;

message AccessTokenData {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at_ms = 3;
}

message ImportedModel {
  string file_name = 1;
  int64 file_size = 2;

  oneof config {
    LlmConfig llm_config = 3;
  }

  // User-chosen display name. If empty, falls back to file_name stem.
  string display_name = 4;
}

message LlmConfig {
  repeated string compatible_accelerators = 1;
  int32 default_max_tokens = 2;
  int32 default_topk = 3;
  float default_topp = 4;
  float default_temperature = 5;
  bool support_image = 6;
  bool support_audio = 7;
  reserved 8, 9; // was support_tiny_garden, support_mobile_actions (removed — Gallery demo features)
  bool support_thinking = 10;
  bool support_tools = 11;
  bool support_speculative_decoding = 12;
}

message RepositoryEntry {
  string id = 1;
  string url = 2;
  bool enabled = 3;
  bool is_built_in = 4;
  int32 content_version = 5;
  int64 last_refresh_ms = 6;
  string last_error = 7;
}

message Settings {
  reserved 1, 2, 3, 6, 8, 9, 10;
  repeated ImportedModel imported_model = 4;
  // Has the app tos been accepted.
  bool is_tos_accepted = 5;
  bool has_seen_benchmark_comparison_help = 7;
  repeated RepositoryEntry repositories = 11;
}

message UserData {
  AccessTokenData access_token_data = 1;
  map<string, string> secrets = 2;
}
